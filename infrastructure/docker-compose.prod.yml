services:
  postgres:
    image: postgres:15-alpine
    container_name: ton-agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ton_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ton_agent_platform}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ton_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ton-agent-redis
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cli-proxy:
    image: eceasy/cli-proxy-api-plus:latest
    container_name: cli-proxy-api-plus
    ports:
      - '127.0.0.1:8317:8317'
    volumes:
      - cli_proxy_data:/CLIProxyAPI
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  cli_proxy_data:
